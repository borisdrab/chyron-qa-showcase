<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prime Scoreboard Preview</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .scoreboard {
      background: #1f2937;
      border: 2px solid #4b5563;
      border-radius: 12px;
      padding: 24px 40px;
      display: flex;
      gap: 24px;
      align-items: center;
      font-size: 32px;
    }

    .team {
      font-weight: bold;
    }

    .score {
      background: #000;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 40px;
    }
  </style>
</head>
<body>
  <div class="scoreboard" data-testid="scoreboard">
    <span class="team">Team A</span>
    <span class="score" data-testid="score">2 : 1</span>
    <span class="team">Team B</span>
  </div>
</body>
</html>
